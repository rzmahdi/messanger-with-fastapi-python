<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room</title>
    <link rel="stylesheet" href="/static/room.css">
</head>
<body>
    <div id="chat-title-container">
        <span id="chat-title"></span>
        <span id="chat-online-number"></span>
    </div>


    <div id="chat-container">
        <div id="messages"></div>

        <div id="input-box">
            <textarea id="message-input" placeholder="Type message..." rows="1" dir="auto"></textarea>
            <button id="send-btn" class="show">Send</button>
            <button id="edit-btn">Edit</button>
        </div>

        <div id="go-to-bottom-container">
            <span>></span>
        </div>
    </div>

    <div id="message-context-box">
        <button id="edit-message-btn">Edit</button>
        <button id="delete-message-btn">Delete</button>
    </div>

    <div id="room-context-box">
        <button id="edit-room-btn">Edit</button>
        <button id="delete-room-btn">Delete</button>
    </div>

    <div id="modal-overlay">
        <div class="edit-room-name-box">
            <button id="modal-edit-room-name-close-btn">x</button>
            <h3>Edit Room Name</h3>
            <input type="text" name="room-name" id="edit-room-name-input" placeholder="New Room Name">
            <span id="room-name-error"></span>
            <button type="button" id="modal-edit-room-name-btn">Edit</button>
        </div>
    </div>

    <script>
        const room_id = "{{ room_id }}";
        const room_name = "{{ room_name }}";
    </script>

    <script src="/static/room.js"></script>
</body>
</html>
