<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../static/register.css">
</head>
<body>
    <div id="register-modal-overlay-notif">
        <div class="register-modal-notif-box">
            <span id="register-notif-modal-text"></span>
            <button id="register-modal-notif-close-btn">x</button>
        </div>
    </div>

    <div class="register-form-box">
        <form id="register-form">
            <input id="register-username" placeholder="username">
            <span id="register-empty-username">Username cant be empty!</span>

            <input id="register-password" type="password" placeholder="password">
            <input id="register-confirm-password" type="password" placeholder="confirm password">
            <span id="passwords-not-match">Passwords are not match!</span>
            <span id="register-password-invalid">Password must be at least 8 characters long and contain at least one uppercase letter, one lowercase letter, and one number.</span>

            <select id="register-security-question">
                <option>Security Question</option>
            </select>

            <input type="text" id="register-security-answer" placeholder="Security answer">
            
            <button type="submit">Register</button>
            <span id="login-text">allready have an account? <a id="login-link" href="/login">Login</a></span>
        </form>
    </div>

    <script src="../static/register.js"></script>
</body>
</html>
